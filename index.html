<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DevOps Tooling &amp; Process Interaction — Interactive Map</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<!-- Font Awesome (SVG+JS build: inlines icons as SVG, no separate webfont file to fetch) -->
<script defer src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/js/all.min.js"></script>
<!-- Fallback: also load the webfont CSS in case JS is blocked -->
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Spline+Sans+Mono:wght@400;500;600&family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-0:#0d1117;
    --bg-1:#131a24;
    --bg-2:#1a2332;
    --grid:#1c2733;
    --ink:#e8eef5;
    --ink-soft:#9bb0c4;
    --ink-dim:#5d728a;
    --green:#9ed8a8;
    --green-deep:#3f9e57;
    --green-glow:rgba(110,200,135,.45);
    --blue:#8fb8f0;
    --blue-deep:#3d6fc4;
    --blue-glow:rgba(120,165,240,.4);
    --amber:#f2d49b;
    --amber-deep:#c79a40;
    --node-green:#1c3326;
    --node-green-b:#3f9e57;
    --node-blue:#1a2742;
    --node-blue-b:#4f7bd1;
    --node-amber:#33291a;
    --node-amber-b:#c79a40;
    --edge:#37485c;
    --edge-orch:#4f7bd1;
    --artifact:#c4a6ff;
    --artifact-b:#7c5cd6;
    --artifact-glow:rgba(140,100,220,.22);
    --panel:#10171f;
    --line:#243140;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;overflow:hidden;background:var(--bg-0);color:var(--ink);
    font-family:'Space Grotesk',sans-serif;-webkit-font-smoothing:antialiased;}

  /* ---------- Atmosphere ---------- */
  #stage{position:fixed;inset:0;
    background:
      radial-gradient(1200px 700px at 70% -10%, rgba(63,158,87,.10), transparent 60%),
      radial-gradient(1000px 600px at 10% 110%, rgba(79,123,209,.10), transparent 60%),
      var(--bg-0);
    cursor:grab;}
  #stage.grabbing{cursor:grabbing;}
  #stage::before{content:"";position:absolute;inset:0;pointer-events:none;z-index:5;
    background:radial-gradient(circle at center, transparent 55%, rgba(0,0,0,.55) 100%);}

  #world{position:absolute;left:0;top:0;transform-origin:0 0;will-change:transform;}
  .grid-bg{position:absolute;left:-2000px;top:-2000px;width:8000px;height:6000px;
    background-image:
      linear-gradient(var(--grid) 1px,transparent 1px),
      linear-gradient(90deg,var(--grid) 1px,transparent 1px);
    background-size:46px 46px;opacity:.5;}

  /* ---------- SVG edges ---------- */
  #edges{position:absolute;left:0;top:0;overflow:visible;pointer-events:none;}
  .edge{fill:none;stroke:var(--edge);stroke-width:2.4;pointer-events:none;
    stroke-linejoin:round;stroke-linecap:round;
    transition:stroke .18s,stroke-width .18s,opacity .18s;}
  .edge.orch{stroke:var(--edge-orch);stroke-dasharray:8 7;opacity:.72;pointer-events:none;
    animation:flow 1.2s linear infinite;}
  @keyframes flow{to{stroke-dashoffset:-30;}}
  .edge.hot{stroke:var(--green);stroke-width:3.8;opacity:1;}
  .edge.orch.hot{stroke:var(--blue);opacity:1;}

  /* ---------- Edge hotspot divs (plain HTML in #world) ---------- */
  .edge-zone{position:absolute;transform:translate(-50%,-50%);
    width:64px;height:32px;border-radius:8px;z-index:20;cursor:default;
    background:transparent;border:1.5px dashed transparent;
    transition:background .14s,border-color .14s;}
  .edge-zone:hover{background:rgba(45,62,82,.7);border-color:rgba(150,180,210,.35);}
  .edge-zone.orch:hover{background:rgba(30,48,90,.75);border-color:rgba(100,140,220,.4);}

  /* ---------- Edge tooltip ---------- */
  #edgeTip{position:fixed;z-index:300;pointer-events:none;
    transform:translate(-50%,-120%);
    background:linear-gradient(160deg,#1e2d3e,#131c28);
    border:1px solid #304560;border-radius:9px;
    padding:6px 14px 7px;
    font:600 12px 'Spline Sans Mono',monospace;
    color:var(--ink);white-space:nowrap;letter-spacing:.3px;
    box-shadow:0 8px 24px rgba(0,0,0,.65);
    opacity:0;transition:opacity .12s;display:none;}
  #edgeTip.show{opacity:1;display:block;}
  #edgeTip.orch{border-color:rgba(79,123,209,.55);}
  #edgeTip .ta{margin-right:6px;color:var(--green);}
  #edgeTip.orch .ta{color:var(--blue);}

  /* ---------- Nodes ---------- */
  .node{position:absolute;border-radius:14px;padding:14px 16px;cursor:pointer;
    background:linear-gradient(180deg,var(--node-green),#162519);
    border:1.5px solid var(--node-green-b);
    box-shadow:0 8px 22px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.05);
    transition:transform .18s cubic-bezier(.2,.8,.2,1),box-shadow .25s,border-color .2s,filter .2s;
    user-select:none;}
  .node:hover{transform:translateY(-3px) scale(1.03);
    box-shadow:0 14px 34px rgba(0,0,0,.6),0 0 0 4px var(--green-glow);
    z-index:30;}
  .node.blue{background:linear-gradient(180deg,var(--node-blue),#121b2e);border-color:var(--node-blue-b);}
  .node.blue:hover{box-shadow:0 14px 34px rgba(0,0,0,.6),0 0 0 4px var(--blue-glow);}
  .node.amber{background:linear-gradient(180deg,var(--node-amber),#221a10);border-color:var(--node-amber-b);}
  .node.amber:hover{box-shadow:0 14px 34px rgba(0,0,0,.6),0 0 0 4px rgba(199,154,64,.4);}
  .node.selected{outline:2px solid var(--green);}
  .node.dimmed{opacity:.28;filter:saturate(.4);}

  /* fixed-height nodes (foundation row): height is locked, content vertically centered */
  .node.fixed{display:flex;flex-direction:column;justify-content:center;overflow:hidden;}
  .node.fixed .n-title{line-height:1.1;}
  .node.fixed .n-sub{margin-top:2px;}

  .node .n-title{font-weight:700;font-size:15px;letter-spacing:.2px;display:flex;align-items:center;gap:9px;line-height:1.15;}
  .node .n-sub{font-size:11.5px;color:var(--ink-soft);margin-top:3px;line-height:1.25;font-family:'Spline Sans Mono',monospace;padding-left:39px;}
  .node .n-ico{width:30px;height:30px;border-radius:9px;display:grid;place-items:center;flex:0 0 auto;
    font-size:22px;color:#a6e7b6;}
  .node.blue .n-ico{font-size:22px;color:#cfe0ff;}
  .node.amber .n-ico{font-size:22px;color:#f7e6bf;}

  /* small annotation nodes (artifacts/files) */
  .anno{position:absolute;display:flex;flex-direction:column;align-items:center;gap:6px;
    color:var(--ink-soft);font-size:12px;font-weight:600;text-align:center;pointer-events:none;
    text-shadow:0 1px 6px #000;}
  .anno i{font-size:30px;color:var(--ink-soft);opacity:.85;}

  /* artifact chips — distinct violet colour so data artifacts read clearly */
  .chip{position:absolute;display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:7px;border-radius:14px;padding:12px 14px;pointer-events:none;text-align:center;
    background:linear-gradient(180deg,#241b38,#191226);
    border:1.5px solid var(--artifact-b);
    box-shadow:0 8px 20px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.06),
               0 0 0 4px var(--artifact-glow);
    transition:transform .18s cubic-bezier(.2,.8,.2,1),box-shadow .25s,filter .2s,opacity .2s;}
  .chip.clickable{pointer-events:auto;cursor:pointer;}
  .chip.clickable:hover{transform:translateY(-3px) scale(1.03);
    box-shadow:0 14px 34px rgba(0,0,0,.6),0 0 0 4px rgba(160,120,230,.5);z-index:30;}
  .chip.selected{outline:2px solid var(--artifact,#c4a6ff);}
  .chip.dimmed{opacity:.28;filter:saturate(.4);}
  .chip i{font-size:26px;color:#d9c2ff;}
  .chip .chip-l{font-size:11.5px;font-weight:700;letter-spacing:.3px;color:#d9c8ff;
    font-family:'Spline Sans Mono',monospace;line-height:1.2;}

  /* container groups */
  .group{position:absolute;border:1.5px dashed var(--line);border-radius:18px;
    background:rgba(255,255,255,.015);}
  .group .g-label{position:absolute;bottom:10px;left:0;right:0;text-align:center;
    color:var(--ink-dim);font-size:13px;font-weight:600;letter-spacing:.5px;}

  /* labelled groups (pipeline + foundations) — label sits on the top border */
  .group.tagged{border-color:var(--g-accent,#2c3a4c);
    background:var(--g-fill,rgba(255,255,255,.012));}
  .group.tagged .g-tag{position:absolute;top:-13px;left:26px;display:flex;align-items:center;gap:8px;
    padding:4px 14px;border-radius:30px;font-family:'Spline Sans Mono',monospace;
    font-size:12px;font-weight:600;letter-spacing:.5px;
    background:var(--g-tagbg,#16202c);color:var(--g-accent,#7d92a6);
    border:1.5px solid var(--g-accent,#2c3a4c);box-shadow:0 4px 12px rgba(0,0,0,.4);}
  .group.tagged .g-note{position:absolute;top:16px;right:20px;font-size:11px;font-weight:500;
    color:var(--ink-dim);font-family:'Spline Sans Mono',monospace;opacity:.85;letter-spacing:.3px;}

  /* ---------- Fan-out bubble ---------- */
  .fan{position:absolute;display:flex;gap:8px;pointer-events:none;z-index:40;
    transform:transl(-50%,0);}
  .fan-chip{width:34px;height:34px;border-radius:50%;display:grid;place-items:center;
    background:linear-gradient(180deg,#1f2c3c,#141d28);border:1.5px solid var(--green-deep);
    color:var(--green);font-size:14px;box-shadow:0 6px 16px rgba(0,0,0,.5);
    opacity:0;transform:translateY(10px) scale(.5);
    animation:pop .32s cubic-bezier(.2,1.3,.4,1) forwards;}
  @keyframes pop{to{opacity:1;transform:translateY(0) scale(1);}}
  /* violet chips: fan icons all share one color */
  .fan.violet .fan-chip{border-color:var(--artifact-b,#7c5cd6);color:var(--artifact,#c4a6ff);}

  /* ---------- Sidebar ---------- */
  #sidebar{position:fixed;top:0;right:0;height:100%;width:430px;max-width:92vw;z-index:200;
    background:linear-gradient(180deg,var(--panel),#0a0f15);
    border-left:1px solid var(--line);
    box-shadow:-30px 0 60px rgba(0,0,0,.55);
    transform:translateX(105%);transition:transform .42s cubic-bezier(.16,1,.3,1);
    display:flex;flex-direction:column;overflow-x:hidden;}
  #sidebar.open{transform:translateX(0);}
  .sb-head{padding:26px 26px 20px;border-bottom:1px solid var(--line);position:relative;
    background:linear-gradient(180deg,rgba(63,158,87,.10),transparent);}
  .sb-head.blue{background:linear-gradient(180deg,rgba(79,123,209,.12),transparent);}
  .sb-head.amber{background:linear-gradient(180deg,rgba(199,154,64,.12),transparent);}
  .sb-head.violet{background:linear-gradient(180deg,rgba(160,120,230,.14),transparent);}
  .sb-cat{font-family:'Spline Sans Mono',monospace;font-size:11px;letter-spacing:2px;
    text-transform:uppercase;color:var(--green);font-weight:600;}
  .sb-head.blue .sb-cat{color:var(--blue);}
  .sb-head.amber .sb-cat{color:var(--amber);}
  .sb-head.violet .sb-cat{color:var(--artifact,#c4a6ff);}
  .sb-title{font-family:'Fraunces',serif;font-size:30px;font-weight:600;margin:8px 0 4px;line-height:1.05;display:flex;gap:14px;align-items:center;}
  .sb-title .ti{width:50px;height:50px;border-radius:13px;display:grid;place-items:center;flex:0 0 auto;
    background:rgba(110,200,135,.12);color:var(--green);font-size:24px;}
  .sb-head.blue .ti{background:rgba(120,165,240,.14);color:var(--blue);}
  .sb-head.amber .ti{background:rgba(199,154,64,.14);color:var(--amber);}
  .sb-head.violet .ti{background:rgba(160,120,230,.16);color:var(--artifact,#c4a6ff);}
  .sb-sub{color:var(--ink-soft);font-size:13.5px;font-family:'Spline Sans Mono',monospace;}
  .sb-close{position:absolute;top:18px;right:18px;width:36px;height:36px;border-radius:10px;
    border:1px solid var(--line);background:rgba(255,255,255,.04);color:var(--ink-soft);
    cursor:pointer;font-size:15px;transition:.2s;}
  .sb-close:hover{background:rgba(255,255,255,.1);color:var(--ink);transform:rotate(90deg);}
  .sb-body{padding:24px 26px 40px;overflow-y:auto;flex:1;}
  .sb-body::-webkit-scrollbar{width:8px;}
  .sb-body::-webkit-scrollbar-thumb{background:var(--line);border-radius:8px;}
  .sb-body p{color:var(--ink);font-size:14.5px;line-height:1.65;}
  .sb-body h6{font-family:'Spline Sans Mono',monospace;font-size:11px;letter-spacing:1.5px;
    text-transform:uppercase;color:var(--ink-dim);margin:26px 0 12px;font-weight:600;}
  .sb-body h6:first-child{margin-top:0;}
  .scope-pills{margin-bottom:4px;}
  .role-pill{display:inline-block;padding:4px 12px;border-radius:30px;font-size:12px;font-weight:600;
    margin:0 6px 6px 0;background:rgba(110,200,135,.12);color:var(--green);
    border:1px solid rgba(110,200,135,.25);font-family:'Spline Sans Mono',monospace;}
  .callout{display:flex;gap:12px;margin:18px 0 4px;padding:14px 16px;border-radius:11px;
    background:rgba(242,212,155,.08);border:1px solid rgba(242,212,155,.30);
    border-left:3px solid var(--amber,#f2d49b);}
  .callout-ico{color:var(--amber,#f2d49b);font-size:16px;flex:0 0 auto;margin-top:2px;}
  .callout-body{font-size:13px;line-height:1.6;color:var(--ink);}
  .callout-body strong{color:var(--amber,#f2d49b);font-weight:700;}

  /* jargon terms: dotted underline + hover tooltip (plain-language definition) */
  .jargon{position:relative;border-bottom:1.5px dotted var(--blue,#8fb8f0);cursor:help;
    color:inherit;}
  .jargon::after{content:attr(data-def);position:absolute;left:0;bottom:calc(100% + 9px);
    width:max-content;max-width:var(--tip-max,280px);padding:10px 12px;border-radius:9px;z-index:400;
    background:linear-gradient(160deg,#1e2d3e,#131c28);border:1px solid #30506e;
    color:var(--ink);font-family:'Space Grotesk',sans-serif;font-weight:400;
    font-size:12px;line-height:1.5;letter-spacing:.1px;text-align:left;white-space:normal;
    box-shadow:0 10px 28px rgba(0,0,0,.6);
    opacity:0;transform:translateY(4px);pointer-events:none;transition:opacity .15s,transform .15s;}
  .jargon::before{content:"";position:absolute;left:14px;bottom:calc(100% + 3px);z-index:401;
    width:11px;height:11px;background:#131c28;border-right:1px solid #30506e;border-bottom:1px solid #30506e;
    transform:rotate(45deg);opacity:0;transition:opacity .15s;pointer-events:none;}
  .jargon:hover::after{opacity:1;transform:translateY(0);}
  .jargon:hover::before{opacity:1;}
  /* flip tooltip below the term for items near the top of the panel */
  .jargon.below::after{bottom:auto;top:calc(100% + 9px);transform:translateY(-4px);}
  .jargon.below:hover::after{transform:translateY(0);}
  .jargon.below::before{bottom:auto;top:calc(100% + 3px);transform:rotate(225deg);}
  /* anchor tooltip to the right edge when the term sits in the right half (avoids overflow) */
  .jargon.flip-right::after{left:auto;right:0;}
  .jargon.flip-right::before{left:auto;right:14px;}
  .sb-list{list-style:none;padding:0;margin:0;}
  .sb-list li{padding:11px 0 11px 40px;border-bottom:1px solid var(--line);position:relative;
    font-size:13.8px;color:var(--ink-soft);line-height:1.5;}
  .sb-list li:last-child{border-bottom:none;}
  .sb-list li i,.sb-list li svg{position:absolute;left:0;top:15px;width:18px;text-align:center;
    color:var(--green);font-size:14px;}
  .flowstep{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:10px;
    background:rgba(255,255,255,.03);border:1px solid var(--line);margin-bottom:8px;font-size:13.5px;}
  .flowstep .fs-dir{color:var(--blue);font-weight:700;font-size:11px;font-family:'Spline Sans Mono',monospace;}

  /* applicable teams / workstreams */
  .team-list{display:flex;flex-direction:column;gap:8px;}
  .team-item{border:1px solid var(--line);border-radius:10px;overflow:hidden;
    background:rgba(255,255,255,.03);}
  /* once open, let tooltips escape the item box (animation already finished) */
  .team-item.open{overflow:visible;}
  .team-row{display:flex;align-items:center;gap:12px;width:100%;padding:10px 14px;
    background:transparent;border:none;cursor:pointer;text-align:left;
    font-family:inherit;font-size:13.5px;color:var(--ink);transition:background .15s;}
  .team-row:hover{background:rgba(255,255,255,.05);}
  .team-name{flex:1;}
  .team-ico{width:30px;height:30px;border-radius:8px;flex:0 0 auto;display:grid;place-items:center;
    background:rgba(255,255,255,.06);font-size:14px;}
  .team-chev{flex:0 0 auto;color:var(--ink-dim);font-size:12px;transition:transform .25s;}
  .team-item.open .team-chev{transform:rotate(180deg);}
  .team-detail{max-height:0;overflow:hidden;transition:max-height .3s ease;}
  /* allow tooltips out once expanded; delay so it doesn't break the open animation */
  .team-item.open .team-detail{max-height:260px;overflow:visible;transition:max-height .3s ease, overflow 0s .3s;}
  .team-detail p{margin:0;padding:0 14px 13px 56px;font-size:13px;line-height:1.55;
    color:var(--ink-soft);}

  /* ---------- HUD ---------- */
  #hud{position:fixed;left:22px;top:22px;z-index:120;}
  .brand{font-family:'Fraunces',serif;font-size:25px;font-weight:700;letter-spacing:-.5px;
    display:flex;align-items:center;gap:11px;white-space:nowrap;}
  .brand .bdot{width:13px;height:13px;border-radius:50%;background:var(--green);
    box-shadow:0 0 14px var(--green);animation:pulse 2s ease-in-out infinite;}
  @keyframes pulse{50%{opacity:.4;transform:scale(.8);}}
  .brand-sub{color:var(--ink-soft);font-size:12.5px;margin-top:4px;font-family:'Spline Sans Mono',monospace;}

  #controls{position:fixed;left:22px;bottom:22px;z-index:120;display:flex;gap:8px;align-items:center;}
  .ctrl{width:42px;height:42px;border-radius:11px;border:1px solid var(--line);
    background:rgba(20,29,40,.85);backdrop-filter:blur(10px);color:var(--ink-soft);
    cursor:pointer;font-size:16px;transition:.18s;display:grid;place-items:center;}
  .ctrl:hover{background:rgba(40,55,75,.9);color:var(--ink);border-color:var(--green-deep);transform:translateY(-2px);}
  #zoomlvl{font-family:'Spline Sans Mono',monospace;font-size:12px;color:var(--ink-dim);
    padding:0 12px;min-width:62px;text-align:center;}

  .hint{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:115;
    background:rgba(20,29,40,.8);backdrop-filter:blur(10px);border:1px solid var(--line);
    border-radius:30px;padding:9px 20px;font-size:12.5px;color:var(--ink-soft);
    font-family:'Spline Sans Mono',monospace;display:flex;gap:18px;align-items:center;
    transition:opacity .5s;}
  .hint kbd{background:rgba(255,255,255,.08);border:1px solid var(--line);border-radius:5px;
    padding:1px 7px;font-size:11px;color:var(--ink);}
  .hint.hide{opacity:0;pointer-events:none;}

  .legend{position:fixed;right:22px;top:22px;z-index:120;background:rgba(16,23,31,.82);
    backdrop-filter:blur(10px);border:1px solid var(--line);border-radius:14px;padding:14px 16px;
    font-size:12px;transition:opacity .35s;}
  .legend.hide{opacity:0;pointer-events:none;}
  .legend .lg-row{display:flex;align-items:center;gap:9px;margin:6px 0;color:var(--ink-soft);}
  .lg-sw{width:22px;height:16px;border-radius:5px;flex:0 0 auto;
    border:1.5px solid var(--lg-c,#3f9e57);
    background:color-mix(in srgb, var(--lg-c,#3f9e57) 18%, transparent);}
  .lg-line{width:24px;height:0;flex:0 0 auto;
    border-top:2.5px dotted var(--lg-c,#4f7bd1);}
  .lg-sep{height:1px;background:var(--line);margin:10px 0 8px;}
  .lg-head{font-family:'Spline Sans Mono',monospace;font-size:10px;letter-spacing:1.5px;
    text-transform:uppercase;color:var(--ink-dim);margin-bottom:6px;}
  .lg-ico{width:22px;flex:0 0 auto;text-align:center;font-size:14px;}
</style>
</head>
<body>

<div id="stage">
  <div id="world">
    <div class="grid-bg"></div>
    <svg id="edges"></svg>
    <!-- nodes injected by JS -->
  </div>
</div>

<!-- HUD -->
<div id="hud">
  <div class="brand">DevOps Tooling &amp; Process Interaction</div>
</div>

<div class="legend" id="legend">
  <div class="lg-row"><span class="lg-sw" style="--lg-c:#3f9e57"></span>Tooling stage</div>
  <div class="lg-row"><span class="lg-sw" style="--lg-c:#4f7bd1"></span>Orchestrator</div>
  <div class="lg-row"><span class="lg-sw" style="--lg-c:#7c5cd6"></span>Artifact / data</div>
  <div class="lg-row"><span class="lg-sw" style="--lg-c:#c79a40"></span>Skill / concept</div>
  <div class="lg-row"><span class="lg-line" style="--lg-c:#4f7bd1"></span>orchestrate flow</div>
  <div class="lg-sep"></div>
  <div class="lg-head">Workstreams</div>
  <div class="lg-row"><span class="lg-ico" style="color:#8fb8f0"><i class="fa-solid fa-code"></i></span>Developers</div>

/* =========================================================
   RENDER NODES, ANNOTATIONS, GROUPS
   ========================================================= */
const world = document.getElementById('world');
const edgesSvg = document.getElementById('edges');

GROUPS.forEach(g=>{
  const d=document.createElement('div');
  if(g.tagged){
    d.className='group tagged';
    d.style.cssText=`left:${g.x}px;top:${g.y}px;width:${g.w}px;height:${g.h}px;`
      +`--g-accent:${g.accent};--g-fill:${g.fill};--g-tagbg:${g.tagbg};`;
    d.innerHTML=`<div class="g-tag"><i class="${g.icon}"></i>${g.tag}</div>`
      +(g.note?`<div class="g-note">${g.note}</div>`:'');
  }else{
    d.className='group';
    d.style.cssText=`left:${g.x}px;top:${g.y}px;width:${g.w}px;height:${g.h}px;`;
    d.innerHTML=`<div class="g-label">${g.label}</div>`;
  }
  world.appendChild(d);
});

CHIPS.forEach(c=>{
  const d=document.createElement('div');
  d.className='chip';
  d.id='chip-'+c.id;
  d.style.cssText=`left:${c.x}px;top:${c.y}px;width:${c.w}px;height:${c.h}px;`;
  d.innerHTML=`<i class="${c.icon}"></i><span class="chip-l">${c.label.replace(/\n/g,'<br>')}</span>`;
  if(INFO[c.id]){
    d.classList.add('clickable');
    d.addEventListener('click',e=>{e.stopPropagation();openSidebar(c.id);});
    if(c.fan && c.fan.length){
      d.addEventListener('mouseenter',()=>showFan(c.id,d,c));
      d.addEventListener('mouseleave',hideFan);
    }
  }
  world.appendChild(d);
});

ANNOS.forEach(a=>{
  const d=document.createElement('div');
  d.className='anno';
  d.style.cssText=`left:${a.x}px;top:${a.y}px;width:120px;transform:translateX(-50%);`;
  d.innerHTML=`<i class="${a.icon}"></i><span>${a.label}</span>`;
  world.appendChild(d);
});

Object.entries(NODES).forEach(([id,n])=>{
  const d=document.createElement('div');
  d.className=`node ${n.type==='blue'?'blue':n.type==='amber'?'amber':''}${n.fixed?' fixed':''}`;
  d.id='node-'+id;
  const hRule = n.fixed ? `height:${n.h}px;` : `min-height:${n.h}px;`;
  d.style.cssText=`left:${n.x}px;top:${n.y}px;width:${n.w}px;${hRule}`;
  d.innerHTML=`<div class="n-title"><span class="n-ico"><i class="${n.icon}"></i></span><span>${n.title}</span></div>
               <div class="n-sub">${n.sub}</div>`;
  d.addEventListener('click',e=>{e.stopPropagation();openSidebar(id);});
  d.addEventListener('mouseenter',()=>showFan(id,d,n));
  d.addEventListener('mouseleave',hideFan);
  world.appendChild(d);
});

/* =========================================================
   EDGES  — SVG visual lines + HTML div hotspots
   ========================================================= */
function rectOf(id){
  const n=NODES[id];
  if(n) return {x:n.x,y:n.y,w:n.w,h:n.h};
  const c=CHIPS.find(c=>c.id===id);
  if(c) return {x:c.x,y:c.y,w:c.w,h:c.h};
  return {x:0,y:0,w:80,h:60};
}
function anchor(r,side){
  switch(side){
    case "l":return {x:r.x,          y:r.y+r.h/2};
    case "r":return {x:r.x+r.w,      y:r.y+r.h/2};
    case "t":return {x:r.x+r.w/2,    y:r.y};
    case "b":return {x:r.x+r.w/2,    y:r.y+r.h};
    default: return {x:r.x+r.w/2,    y:r.y+r.h/2};
  }
}

/* =========================================================
   ORTHOGONAL ROUTER — straight segments + rounded corners
   ========================================================= */
const STUB = 26;   // how far the line exits perpendicular from a block
const CORNER = 18; // corner radius

function stubPoint(p, side, len){
  switch(side){
    case "l": return {x:p.x-len, y:p.y};
    case "r": return {x:p.x+len, y:p.y};
    case "t": return {x:p.x, y:p.y-len};
    case "b": return {x:p.x, y:p.y+len};
    default:  return {x:p.x, y:p.y};
  }
}
const isHoriz = s => s==="l"||s==="r";

/* Build an orthogonal list of waypoints from p1(side a) to p2(side b).
   opts.corridorY / opts.corridorX force the cross-corridor to a fixed line
   (used to route an edge around other blocks). */
function routeOrtho(p1,a,p2,b,opts){
  opts=opts||{};
  const s1=stubPoint(p1,a,STUB);
  const s2=stubPoint(p2,b,STUB);

  const aH=isHoriz(a), bH=isHoriz(b);
  let pts;

  if(aH && bH){
    // both horizontal exits: route via a vertical corridor between the two blocks
    const midX = (opts.corridorX!=null) ? opts.corridorX : (s1.x+s2.x)/2;
    if(opts.corridorX==null && Math.abs(p1.y-p2.y)<=2){
      pts=[p1,p2]; // aligned — straight across
    }else{
      // skip stubs: corner directly off each anchor for longer, roundable legs
      pts=[p1, {x:midX,y:p1.y}, {x:midX,y:p2.y}, p2];
    }
  }else if(!aH && !bH){
    // both vertical exits: route via a horizontal corridor between the two blocks
    const midY = (opts.corridorY!=null) ? opts.corridorY : (s1.y+s2.y)/2;
    if(opts.corridorY==null && Math.abs(p1.x-p2.x)<=2){
      pts=[p1,p2]; // aligned — straight
    }else{
      pts=[p1, {x:p1.x,y:midY}, {x:p2.x,y:midY}, p2];
    }
  }else{
    // perpendicular exits: single clean L-bend.
    // corner sits at the intersection of p1's exit axis and p2's exit axis
    const corner = aH ? {x:p2.x, y:p1.y} : {x:p1.x, y:p2.y};
    pts=[p1, corner, p2];
  }

  // de-duplicate consecutive identical points
  const out=[];
  for(const pt of pts){
    const last=out[out.length-1];
    if(!last || Math.abs(last.x-pt.x)>0.5 || Math.abs(last.y-pt.y)>0.5) out.push(pt);
  }
  return out;
}

/* Convert a waypoint list into an SVG path string with rounded corners */
function roundedPath(pts, r){
  if(pts.length<2) return "";
  if(pts.length===2) return `M${pts[0].x},${pts[0].y} L${pts[1].x},${pts[1].y}`;
  let d=`M${pts[0].x},${pts[0].y}`;
  for(let i=1;i<pts.length-1;i++){
    const p0=pts[i-1], p1=pts[i], p2=pts[i+1];
    // vectors into and out of the corner
    const v1={x:p1.x-p0.x, y:p1.y-p0.y};
    const v2={x:p2.x-p1.x, y:p2.y-p1.y};
    const len1=Math.hypot(v1.x,v1.y)||1;
    const len2=Math.hypot(v2.x,v2.y)||1;
    const rr=Math.min(r, len1/2, len2/2);
    const a={x:p1.x - v1.x/len1*rr, y:p1.y - v1.y/len1*rr};
    const c={x:p1.x + v2.x/len2*rr, y:p1.y + v2.y/len2*rr};
    d+=` L${a.x},${a.y} Q${p1.x},${p1.y} ${c.x},${c.y}`;
  }
  const last=pts[pts.length-1];
  d+=` L${last.x},${last.y}`;
  return d;
}

/* midpoint of the longest segment (for hotspot/tooltip placement) */
function pathMidpoint(pts){
  let best=null, bestLen=-1;
  for(let i=0;i<pts.length-1;i++){
    const a=pts[i], b=pts[i+1];
    const len=Math.hypot(b.x-a.x,b.y-a.y);
    if(len>bestLen){bestLen=len; best={x:(a.x+b.x)/2,y:(a.y+b.y)/2};}
  }
  return best||pts[0];
}

const edgeTip=document.getElementById('edgeTip');
let activeVis=null;

function showTip(zone,clientX,clientY){
  const orch=zone.dataset.orch==='1';
  edgeTip.className='show'+(orch?' orch':'');
  edgeTip.innerHTML=`<span class="ta">${orch?'⇢':'→'}</span>${zone.dataset.label}`;
  edgeTip.style.left=clientX+'px';
  edgeTip.style.top=(clientY-12)+'px';

}

function buildEdges(){
  // Remove old edge-zone divs if rebuilding
  world.querySelectorAll('.edge-zone').forEach(d=>d.remove());

  let html=`<defs>
    <marker id="arr" markerWidth="18" markerHeight="18" refX="13" refY="8" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L15,8 L0,16 Z" fill="#37485c"/></marker>
    <marker id="arrO" markerWidth="20" markerHeight="20" refX="14" refY="9" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L17,9 L0,18 Z" fill="#4f7bd1"/></marker>
  </defs>`;

  EDGES.forEach(e=>{
    const ra=rectOf(e.f), rb=rectOf(e.t);
    const p1=anchor(ra,e.a);
    // Pull the arrow tip slightly outside the target block so the (larger)
    // arrowhead renders in the gap instead of being painted over by the block.
    const GAP = e.orch ? 13 : 11;
    const p2=stubPoint(anchor(rb,e.b), e.b, GAP);

    const pts=routeOrtho(p1,e.a,p2,e.b,{corridorY:e.corridorY, corridorX:e.corridorX});
    const dpath=roundedPath(pts, CORNER);

    const eid=`${e.f}__${e.t}`;
    html+=`<path id="vis-${eid}" class="${e.orch?'edge orch':'edge'}" d="${dpath}"
            marker-end="url(#${e.orch?'arrO':'arr'})"
            data-from="${e.f}" data-to="${e.t}"></path>`;

    if(e.label){
      const mid=pathMidpoint(pts);
      const zone=document.createElement('div');
      zone.className='edge-zone'+(e.orch?' orch':'');
      zone.style.left=mid.x+'px';
      zone.style.top=mid.y+'px';
      zone.dataset.label=e.label;
      zone.dataset.orch=e.orch?'1':'0';
      zone.dataset.vis='vis-'+eid;
      zone.addEventListener('mouseenter',ev=>showTip(zone,ev.clientX,ev.clientY));
      zone.addEventListener('mousemove', ev=>{
        edgeTip.style.left=ev.clientX+'px';
        edgeTip.style.top=(ev.clientY-12)+'px';
      });
      zone.addEventListener('mouseleave',hideTip);
      world.appendChild(zone);
    }
  });

  edgesSvg.innerHTML=html;
  edgesSvg.setAttribute('width','3000');
  edgesSvg.setAttribute('height','1400');
}
buildEdges();

/* Glossary: jargon term -> plain-language definition.
   Terms are matched case-insensitively on word boundaries and get a

// Pre-sort terms longest-first so multi-word phrases win over their sub-words
const GLOSSARY_TERMS = Object.keys(GLOSSARY).sort((a,b)=>b.length-a.length);
function escapeHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function escapeAttr(s){return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

/* Wrap glossary terms in HTML text with hover-definition spans.
   Operates only on text nodes (never inside tags), and scans each text
   segment left-to-right against the ORIGINAL characters so inserted
   markup is never re-matched. Each term is annotated at most once. */
function annotateJargon(html){
  const used=new Set();
  return html.replace(/(<[^>]+>)|([^<]+)/g, (m, tag, text)=>{
    if(tag) return tag;            // leave tags untouched
    let out='';
    let i=0;
    const lower=text.toLowerCase();
    while(i<text.length){
      // find the earliest unused glossary term at or after i
      let best=null;
      for(const term of GLOSSARY_TERMS){
        if(used.has(term)) continue;
        const tl=term.toLowerCase();
        let from=i;
        while(true){
          const idx=lower.indexOf(tl, from);
          if(idx<0) break;
          const before=idx>0?text[idx-1]:' ';
          const after=idx+term.length<text.length?text[idx+term.length]:' ';
          const bOK=!/[A-Za-z0-9]/.test(before);
          const aOK=!/[A-Za-z0-9]/.test(after);
          if(bOK&&aOK){
            if(!best || idx<best.idx){ best={idx, term, len:term.length}; }
            break;
          }
          from=idx+1;
        }
      }
      if(!best){ out+=escapeHtml(text.slice(i)); break; }
      out+=escapeHtml(text.slice(i, best.idx));
      const matched=text.substr(best.idx, best.len);
      out+=`<span class="jargon" data-def="${escapeAttr(GLOSSARY[best.term])}">${escapeHtml(matched)}</span>`;
      used.add(best.term);
      i=best.idx+best.len;
    }
    return out;
  });
}

        body+=`<div class="team-item">`
            +`<button class="team-row" type="button" onclick="toggleTeam(this)">`
            +`<span class="team-ico" style="color:${it.color}"><i class="fa-solid ${it.ic}"></i></span>`
            +`<span class="team-name">${it.team}</span>`
            +`<i class="fa-solid fa-chevron-down team-chev"></i></button>`
            +`<div class="team-detail"><p>${rel}</p></div>`
            +`</div>`;
      });
      body+=`</div>`;
    }
  }
  if(info.flow){
    body+=`<h6>Data flow</h6>`;
    info.flow.forEach(([dir,txt])=>{
      body+=`<div class="flowstep"><span class="fs-dir">${dir}</span><span>${txt}</span></div>`;
    });
  }
  if(info.points){
    body+=`<h6>Key points</h6><ul class="sb-list">`;
    info.points.forEach(p=>body+=`<li><i class="fa-solid fa-circle-check"></i>${p}</li>`);
    body+=`</ul>`;
  }
  const sbBody=document.getElementById('sbBody');
  sbBody.innerHTML=annotateJargon(body);
  sbBody.scrollTop=0;
  sidebar.classList.add('open');

  highlightConnections(id);
}
function closeSidebar(){
  sidebar.classList.remove('open');
  selectedId=null;
  document.querySelectorAll('.node, .chip').forEach(el=>el.classList.remove('selected','dimmed'));
  document.querySelectorAll('.edge').forEach(el=>{el.style.opacity='';el.style.strokeWidth='';});
}
document.getElementById('sbClose').addEventListener('click',closeSidebar);

// Expand/collapse a team row to reveal how the tool relates to that team
function toggleTeam(btn){
  const item=btn.closest('.team-item');
  item.classList.toggle('open');
}
window.toggleTeam=toggleTeam;

// Decide tooltip placement live on hover: flip below if an upward tooltip
// would hit the header, and flip/cap horizontally so it never overflows the panel.
(function(){
  const sbBody=document.getElementById('sbBody');
  const TIP_SPACE=130; // space an upward tooltip needs above the term
  const SIDE_PAD=14;   // keep the bubble this far from the panel edges
  sbBody.addEventListener('mouseover', e=>{
    const j=e.target.closest('.jargon');
    if(!j || !sbBody.contains(j)) return;
    const term=j.getBoundingClientRect();
    const panel=sbBody.getBoundingClientRect();

    // vertical: flip below the term when there isn't room above
    j.classList.toggle('below', (term.top - panel.top) < TIP_SPACE);

    // horizontal: anchor to whichever side leaves more room, and cap width
    const spaceRight = panel.right - term.left;   // room if left-anchored at the term
    const spaceLeft  = term.right - panel.left;    // room if right-anchored at the term
    const useRight = spaceLeft > spaceRight;       // flip to right-anchor when more room on the left
    j.classList.toggle('flip-right', useRight);
    const avail = Math.max(spaceRight, spaceLeft) - SIDE_PAD;
    j.style.setProperty('--tip-max', Math.min(300, Math.max(160, avail)) + 'px');
  });
})();

function highlightConnections(id){
  const connected=new Set([id]);
  EDGES.forEach(e=>{if(e.f===id)connected.add(e.t); if(e.t===id)connected.add(e.f);});
  document.querySelectorAll('.node').forEach(el=>{
    const nid=el.id.replace('node-','');
    el.classList.toggle('dimmed', !connected.has(nid));
  });
  document.querySelectorAll('.chip').forEach(el=>{
    const cid=el.id.replace('chip-','');
    el.classList.toggle('dimmed', !connected.has(cid));
  });
  document.querySelectorAll('.edge').forEach(el=>{
    const isCon=el.dataset.from===id||el.dataset.to===id;
    el.style.opacity=isCon?'1':'.12';
    el.style.strokeWidth=isCon?'3.4':'';
  });
}

/* =========================================================
   PAN & ZOOM
   ========================================================= */
const stage=document.getElementById('stage');
let scale=1,tx=0,ty=0;
let isPanning=false,startX=0,startY=0,moved=false;
const MIN=0.3,MAX=2.6;

function apply(){
  world.style.transform=`translate(${tx}px,${ty}px) scale(${scale})`;
  document.getElementById('zoomlvl').textContent=Math.round(scale*100)+'%';
}
function fitView(){
  // bounding box of all nodes
  let minX=1e9,minY=1e9,maxX=-1e9,maxY=-1e9;
  Object.values(NODES).forEach(n=>{
    minX=Math.min(minX,n.x);minY=Math.min(minY,n.y);
    maxX=Math.max(maxX,n.x+n.w);maxY=Math.max(maxY,n.y+n.h);
  });
  const pad=90;
  const bw=maxX-minX+pad*2, bh=maxY-minY+pad*2;
  const vw=window.innerWidth, vh=window.innerHeight;
  scale=Math.min(vw/bw, vh/bh, 1.1);
  scale=Math.max(MIN,Math.min(MAX,scale));
  tx=(vw-(bw)*scale)/2 - (minX-pad)*scale;
  ty=(vh-(bh)*scale)/2 - (minY-pad)*scale;
  apply();
}
window.addEventListener('resize',()=>{ /* keep current */ });

stage.addEventListener('mousedown',e=>{
  if(e.target.closest('.node')||e.target.closest('.chip.clickable')||e.target.closest('#sidebar'))return;
  isPanning=true;moved=false;startX=e.clientX-tx;startY=e.clientY-ty;
  stage.classList.add('grabbing');
});
window.addEventListener('mousemove',e=>{
  if(!isPanning)return;
  tx=e.clientX-startX;ty=e.clientY-startY;moved=true;apply();
});
window.addEventListener('mouseup',()=>{isPanning=false;stage.classList.remove('grabbing');});

// Close the sidebar when clicking anywhere outside it (and not on a node, and not while dragging)
document.addEventListener('click',e=>{
  if(!sidebar.classList.contains('open')) return;
  if(moved) return;                              // ignore the click that ends a pan
  if(e.target.closest('#sidebar')) return;       // clicks inside the panel keep it open
  if(e.target.closest('.node')) return;          // clicking another block switches selection
  if(e.target.closest('.chip.clickable')) return;// clicking an artifact chip switches selection
  if(e.target.closest('#controls')) return;      // zoom controls shouldn't close it
  closeSidebar();
});

stage.addEventListener('wheel',e=>{
  e.preventDefault();
  const rect=stage.getBoundingClientRect();
  const mx=e.clientX-rect.left, my=e.clientY-rect.top;
  const delta=-e.deltaY*0.0014;
  const ns=Math.max(MIN,Math.min(MAX,scale*(1+delta)));
  const k=ns/scale;
  tx=mx-(mx-tx)*k;ty=my-(my-ty)*k;
  scale=ns;apply();
},{passive:false});

function zoomBy(f){
  const cx=window.innerWidth/2, cy=window.innerHeight/2;
  const ns=Math.max(MIN,Math.min(MAX,scale*f));
  const k=ns/scale;
  tx=cx-(cx-tx)*k;ty=cy-(cy-ty)*k;scale=ns;apply();
}
document.getElementById('zoomIn').onclick=()=>zoomBy(1.25);
document.getElementById('zoomOut').onclick=()=>zoomBy(0.8);
document.getElementById('reset').onclick=()=>{scale=1;tx=60;ty=40;apply();};
document.getElementById('fit').onclick=fitView;

/* touch (pinch + pan) */
let touchDist=0,touchMid=null;
stage.addEventListener('touchstart',e=>{
  if(e.target.closest('.node')||e.target.closest('.chip.clickable'))return;
  if(e.touches.length===1){isPanning=true;moved=false;startX=e.touches[0].clientX-tx;startY=e.touches[0].clientY-ty;}
  else if(e.touches.length===2){
    touchDist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    touchMid={x:(e.touches[0].clientX+e.touches[1].clientX)/2,y:(e.touches[0].clientY+e.touches[1].clientY)/2};
  }
},{passive:false});
stage.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(e.touches.length===1&&isPanning){tx=e.touches[0].clientX-startX;ty=e.touches[0].clientY-startY;moved=true;apply();}
  else if(e.touches.length===2){
    const nd=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    const ns=Math.max(MIN,Math.min(MAX,scale*(nd/touchDist)));
    const k=ns/scale;
    tx=touchMid.x-(touchMid.x-tx)*k;ty=touchMid.y-(touchMid.y-ty)*k;
    scale=ns;touchDist=nd;apply();
  }
},{passive:false});
stage.addEventListener('touchend',()=>{isPanning=false;});

/* =========================================================
   INIT  — hide hint, fit view, staggered node entrance
   ========================================================= */
window.addEventListener('load',()=>{
  // Ensure Font Awesome converts every <i> (incl. dynamically injected ones) to SVG
  if(window.FontAwesome && window.FontAwesome.dom){
    try{window.FontAwesome.dom.i2svg();}catch(e){}
  }
  fitView();
  // entrance animation
  const nodes=[...document.querySelectorAll('.node')];
  nodes.forEach((el,i)=>{
    el.style.opacity='0';el.style.transform='translateY(14px) scale(.96)';
    setTimeout(()=>{el.style.transition='opacity .5s, transform .5s cubic-bezier(.2,.9,.3,1)';
      el.style.opacity='';el.style.transform='';},90+i*45);
  });
});
setTimeout(()=>document.getElementById('hint').classList.add('hide'),6500);
// fade legend/hint while panning is fine; keep simple
</script>
